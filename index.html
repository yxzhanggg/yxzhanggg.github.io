<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Blog Title</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        header {
            text-align: center;
            padding: 20px;
            background-color: #f2f2f2;
        }

        main {
            max-width: 800px;
            margin: auto;
        }

        article {
            margin-bottom: 40px;
        }

        h2 {
            color: #333;
        }

        p {
            color: #666;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #f2f2f2;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Your Blog Title</h1>
        <p>Welcome to your blog!</p>
    </header>

    <main>
        <article>
            <h2>Post Title 1</h2>
            <p>This is the content of your first blog post. Write something interesting here.</p>
        </article>

        <article>
            <h2>Post Title 2</h2>
            <p>This is the content of your second blog post. Share your thoughts and ideas.</p>
        </article>

        <!-- Add more articles as needed -->
    </main>

    <footer>
        <p>&copy; 2024 Your Blog Name. All rights reserved.</p>
    </footer>

</body>
</html>
